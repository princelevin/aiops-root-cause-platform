services:
  backend:
    build:
      context: ./backend
    container_name: aiops-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/aiops.db:/app/aiops.db
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
    container_name: aiops-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend